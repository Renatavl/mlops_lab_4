defaults:
  - model: random_forest
  - hpo: tpe
  - _self_

seed: 42
study_name: ${model.type}_${hpo.sampler}

split:
  test_size: 0.2
  random_state: ${seed}

mlflow:
  tracking_uri: null
  experiment_name: HPO_Lab3
  parent_run_name: ${study_name}
  log_model: true
  register_model: false
  model_name: BestOptimizedModel
  stage: Staging

data:
  raw_path: data/raw/weatherAUS.csv
  processed_path: data/processed/processed_data.pickle
  metadata_path: data/processed/metadata.json
  target_column: RainTomorrow

output:
  model_dir: models
  reports_dir: reports
  best_model_path: ${output.model_dir}/${study_name}_best_model.pkl
  trained_model_path: ${output.model_dir}/${study_name}_trained_model.pkl
  ci_model_path: model.pkl
  best_params_path: ${output.reports_dir}/${study_name}_best_params.json
  summary_path: ${output.reports_dir}/${study_name}_summary.json
  trial_history_path: ${output.reports_dir}/${study_name}_trial_history.csv
  final_metrics_path: ${output.reports_dir}/${study_name}_final_metrics.json
  ci_metrics_path: metrics.json
  ci_confusion_matrix_path: confusion_matrix.png
  comparison_json_path: ${output.reports_dir}/sampler_comparison.json
  comparison_md_path: ${output.reports_dir}/sampler_comparison.md

training:
  params_path: null
  log_to_mlflow: true
  run_name: ${study_name}_final_train

hpo:
  n_trials: 20
  metric: f1
  direction: maximize
  use_cv: false
  cv_folds: 5
  validation_size: 0.2
  sampler: tpe
  random_forest:
    n_estimators: {low: 50, high: 300}
    max_depth: {low: 3, high: 15}
    min_samples_split: {low: 2, high: 10}
    min_samples_leaf: {low: 1, high: 5}
  logistic_regression:
    C: {low: 1.0e-3, high: 1.0e2}
    solver: [liblinear, lbfgs]
    penalty: [l2]
  grid:
    random_forest:
      n_estimators: [50, 100, 200]
      max_depth: [5, 10, 15]
      min_samples_split: [2, 5, 10]
      min_samples_leaf: [1, 2, 4]
    logistic_regression:
      C: [0.01, 0.1, 1.0, 10.0]
      solver: [liblinear]
      penalty: [l2]

hydra:
  run:
    dir: .
  output_subdir: null
